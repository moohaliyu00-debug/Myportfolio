	<div class="container nav-container">
		<div class="brand"><a href="index.html">Muhammad</a></div>

<main>
	<section class="container">
		<h2 class="section-title">Contact Me</h2>
		<div class="card">
			<p class="muted">Feel free to reach out for internships, project collaborations, or quick questions.</p>
			<form action="#" method="post" aria-label="Contact form">
				<div style="margin-bottom:12px">
					<label for="name">Full name</label>
					<input id="name" name="name" type="text" placeholder="Muhammad Muhammad Aliyu" required>
				</div>

				<div style="margin-bottom:12px">
					<label for="email">Email</label>
					<input id="email" name="email" type="email" placeholder="youremail@example.com" required>
				</div>

				<div style="margin-bottom:12px">
					<label for="message">Message</label>
					<textarea id="message" name="message" rows="5" placeholder="Write a short message" required></textarea>
				</div>

				<button class="btn" type="submit">Send message</button>
			</form>
		</div>
	</section>
</main>

<footer>
	<div class="container">

	</div>
